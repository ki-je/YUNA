<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Novel - Yuna</title>
    <style>
        :root {
            --point-color: #87CEEB; /* 하늘색 */
            --bg-gradient: linear-gradient(to bottom, transparent, rgba(0, 0, 0, 0.9));
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a;
            font-family: 'Pretendard', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 메인 컨테이너 (1216*832 최적화) */
        #game-container {
            position: relative;
            width: 1216px;
            height: 832px;
            background-color: #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            overflow: hidden;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease-in-out;
        }

        /* 배경 이미지 레이어 */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* 대사 블록 (하단) */
        #dialogue-box {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 250px;
            background: var(--bg-gradient);
            z-index: 10;
            padding: 40px 60px;
            box-sizing: border-box;
            color: white;
            cursor: pointer;
        }

        #speaker-name {
            font-size: 28px;
            font-weight: bold;
            color: var(--point-color);
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #text-content {
            font-size: 24px;
            line-height: 1.6;
            word-break: keep-all;
        }

        /* 플레이어 대사 선택창 (우측 상단 겹침) */
        #player-response-box {
            position: absolute;
            right: 40px;
            bottom: 210px;
            background: rgba(135, 206, 235, 0.9);
            color: #1a1a1a;
            padding: 15px 30px;
            border-radius: 20px 20px 0 20px;
            font-size: 22px;
            font-weight: bold;
            display: none;
            z-index: 15;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            animation: fadeIn 0.4s ease-out;
        }

        /* 중앙 선택지 레이아웃 */
        #choice-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            gap: 20px;
            z-index: 20;
            width: 60%;
            display: none;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.9);
            border: 3px solid var(--point-color);
            padding: 25px;
            font-size: 24px;
            font-weight: bold;
            color: #333;
            text-align: center;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        .choice-btn:hover {
            background: var(--point-color);
            color: white;
            transform: scale(1.05);
        }

        /* 소박한 대화 선택창 (말걸기 선택지) */
        #sub-choice-container {
            position: absolute;
            right: 60px;
            bottom: 260px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
            display: none;
        }

        .sub-choice-btn {
            background: rgba(0, 0, 0, 0.7);
            border: 1px solid var(--point-color);
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 18px;
        }

        .sub-choice-btn:hover {
            background: var(--point-color);
        }

        /* 스타트 & 리스타트 버튼 */
        .overlay-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            color: white;
        }

        .main-btn {
            padding: 20px 60px;
            font-size: 30px;
            background: transparent;
            border: 4px solid var(--point-color);
            color: var(--point-color);
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            border-radius: 10px;
        }

        .main-btn:hover {
            background: var(--point-color);
            color: white;
        }

        /* 흔들리는 볼드체 효과 */
        .shake-text {
            display: inline-block;
            font-weight: 900;
            font-size: 1.2em;
            animation: shake 0.1s infinite;
            color: #ff4d4d;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-1px, -2px) rotate(-1deg); }
            40% { transform: translate(-3px, 0px) rotate(1deg); }
            60% { transform: translate(3px, 2px) rotate(0deg); }
            80% { transform: translate(1px, -1px) rotate(1deg); }
            100% { transform: translate(-1px, 2px) rotate(-1deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="start-screen" class="overlay-screen">
        <h1 style="font-size: 60px; margin-bottom: 40px; color: var(--point-color);">YUNA : ANGEL</h1>
        <button class="main-btn" onclick="startGame()">GAME START</button>
    </div>

    <div id="end-screen" class="overlay-screen" style="display: none;">
        <h2 style="font-size: 40px; margin-bottom: 30px;">STORY END</h2>
        <button class="main-btn" onclick="location.reload()">처음으로 돌아가기</button>
    </div>

    <div id="sub-choice-container"></div>

    <div id="choice-container"></div>

    <div id="player-response-box"></div>

    <div id="dialogue-box" onclick="handleBoxClick()">
        <div id="speaker-name"></div>
        <div id="text-content"></div>
    </div>
</div>

<script>
    const script = [
        {
            bg: '1.png',
            speaker: '유나',
            text: '저기 있잖아....',
            subChoices: ['뭔데', '누군데 말걸지?', '저기 없는데.']
        },
        {
            bg: '2.png',
            speaker: '유나',
            text: '제발 도와줘!!!!',
            subChoices: ['일단 말해봐', '내가 왜', '싫어']
        },
        {
            bg: '3.png',
            speaker: '유나',
            text: '사실 나는 천사인데, 하늘에서 떨어져 버렸어... 그런데 날개를 다쳐서 회복될 때까지만 같이있어줘'
        },
        {
            bg: '4.png',
            speaker: '유나',
            text: '내가 너의 수호천사가 되줄게!!!',
            mainChoices: [
                { text: '재미있겠다 당장하자', next: 4 },
                { text: '천사라고? 미친거야? 너 사이비지?', next: 5 }
            ]
        },
        {
            bg: '5.png',
            speaker: '유나',
            text: '정말? 너무 고마워 진짜 기뻐~',
            isEnd: true
        },
        {
            bg: '6.png',
            speaker: '유나',
            text: '<span class="shake-text">흐아아앙!!!</span> 그런거 진짜 아니란 말이야아....',
            isEnd: true
        }
    ];

    let currentIndex = 0;
    let isTyping = false;
    let currentText = "";
    let typingInterval;

    function startGame() {
        document.getElementById('start-screen').style.display = 'none';
        updateScene();
    }

    function updateScene() {
        const scene = script[currentIndex];
        
        // 배경 변경
        document.getElementById('game-container').style.backgroundImage = `url('${scene.bg}')`;
        
        // 초기화
        document.getElementById('sub-choice-container').style.display = 'none';
        document.getElementById('choice-container').style.display = 'none';
        document.getElementById('player-response-box').style.display = 'none';
        
        startTyping(scene.speaker, scene.text);
    }

    function startTyping(name, text) {
        isTyping = true;
        document.getElementById('speaker-name').innerText = name;
        const textElement = document.getElementById('text-content');
        textElement.innerHTML = "";
        
        let i = 0;
        // HTML 태그 처리 로직 포함
        if (text.includes('<')) {
            textElement.innerHTML = text;
            finishTyping();
            return;
        }

        typingInterval = setInterval(() => {
            if (i < text.length) {
                textElement.innerHTML += text.charAt(i);
                i++;
            } else {
                finishTyping();
            }
        }, 50);
    }

    function finishTyping() {
        clearInterval(typingInterval);
        isTyping = false;
        
        const scene = script[currentIndex];
        if (scene.subChoices) {
            showSubChoices(scene.subChoices);
        } else if (scene.mainChoices) {
            showMainChoices(scene.mainChoices);
        }
    }

    function handleBoxClick() {
        if (isTyping) return; // 타이핑 중엔 무시
        
        const scene = script[currentIndex];
        // 선택지가 있는 경우 클릭으로 넘어가지 않음
        if (scene.subChoices || scene.mainChoices) return;
        
        if (scene.isEnd) {
            document.getElementById('end-screen').style.display = 'flex';
            return;
        }

        currentIndex++;
        updateScene();
    }

    function showSubChoices(choices) {
        const container = document.getElementById('sub-choice-container');
        container.innerHTML = "";
        choices.forEach(choice => {
            const btn = document.createElement('div');
            btn.className = 'sub-choice-btn';
            btn.innerText = choice;
            btn.onclick = () => selectPlayerText(choice);
            container.appendChild(btn);
        });
        container.style.display = 'flex';
    }

    function showMainChoices(choices) {
        const container = document.getElementById('choice-container');
        container.innerHTML = "";
        choices.forEach(choice => {
            const btn = document.createElement('div');
            btn.className = 'choice-btn';
            btn.innerText = choice.text;
            btn.onclick = () => {
                currentIndex = choice.next;
                updateScene();
            };
            container.appendChild(btn);
        });
        container.style.display = 'flex';
    }

    function selectPlayerText(text) {
        // 플레이어 대사창에 표시
        const pBox = document.getElementById('player-response-box');
        pBox.innerText = text;
        pBox.style.display = 'block';
        
        // 하단 대사창에 플레이어 대사 타이핑
        document.getElementById('sub-choice-container').style.display = 'none';
        isTyping = true;
        document.getElementById('speaker-name').innerText = "나";
        const textElement = document.getElementById('text-content');
        textElement.innerText = "";
        
        let i = 0;
        const tInterval = setInterval(() => {
            if (i < text.length) {
                textElement.innerText += text.charAt(i);
                i++;
            } else {
                clearInterval(tInterval);
                isTyping = false;
                // 약간의 대기 후 다음 유나 대사로 이동
                setTimeout(() => {
                    currentIndex++;
                    updateScene();
                }, 1000);
            }
        }, 50);
    }
</script>

</body>
</html>
