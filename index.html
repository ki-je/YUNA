<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수호천사 유나 - Fixed Ratio</title>
    <style>
        :root {
            --point-color: #87CEEB;
            --point-hover: #5fbce2;
            --bg-grad: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.95));
            --game-width: 1216px;
            --game-height: 832px;
            --aspect-ratio: 1216 / 832;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Malgun Gothic', sans-serif;
            background-color: #000;
            display: flex; justify-content: center; align-items: center;
        }

        #game-outer-container {
            width: 100vw;
            height: calc(100vw / (var(--aspect-ratio)));
            max-width: var(--game-width);
            max-height: var(--game-height);
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 배경 이미지 레이어 (자연스러운 전환용) */
        #game-bg {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            transition: background-image 0.8s ease-in-out; /* 장면 전환 효과 */
            z-index: 1;
        }

        #game-screen {
            position: absolute; inset: 0;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            cursor: pointer; z-index: 2;
        }

        /* 선택지 스타일 통합 */
        .choice-container {
            position: absolute; inset: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; gap: 15px; z-index: 40;
        }

        #linear-choice-container {
            background: transparent; justify-content: flex-end; align-items: flex-end;
            bottom: 240px; right: 4%; inset: auto;
        }

        .choice-btn {
            background: rgba(255, 255, 255, 0.95);
            color: #111; border: 2px solid var(--point-color);
            padding: 12px 25px; border-radius: 20px 20px 0 20px;
            cursor: pointer; font-size: 18px; font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }

        .branch-btn {
            width: 80%; max-width: 500px; padding: 20px;
            background: rgba(0, 0, 0, 0.6); color: white;
            border: 2px solid var(--point-color); border-radius: 12px;
            font-size: 20px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s; text-align: center;
        }

        .choice-btn:hover, .branch-btn:hover {
            background: var(--point-color); color: white;
            transform: scale(1.02);
        }

        /* 하단 대사창 */
        #dialogue-area {
            position: relative; width: 94%; max-width: 1100px;
            height: 180px; margin-bottom: 25px; padding: 30px 45px;
            background: var(--bg-grad); border-radius: 15px;
            border: 1px solid rgba(135, 206, 235, 0.3);
            box-sizing: border-box; color: white; z-index: 10;
        }

        #player-badge {
            position: absolute; top: -35px; right: 30px;
            background: var(--point-color); color: #000;
            padding: 6px 20px; font-weight: bold; border-radius: 10px 10px 0 0;
            display: none; font-size: 15px;
        }

        #name-label { color: var(--point-color); font-size: 24px; font-weight: bold; margin-bottom: 10px; }
        #text-content { font-size: 19px; line-height: 1.6; word-break: keep-all; }

        #start-layer {
            position: absolute; inset: 0; background: #000;
            display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100;
        }

        #start-btn {
            background: none; border: 3px solid var(--point-color);
            color: var(--point-color); padding: 15px 50px; font-size: 25px;
            cursor: pointer; border-radius: 50px; font-weight: bold; transition: 0.3s;
        }
        #start-btn:hover { background: var(--point-color); color: #000; }

        .shake { display: inline-block; animation: shake-anim 0.1s infinite; color: #ff8e8e; }
        @keyframes shake-anim { 0%{transform:translate(1px,1px)} 50%{transform:translate(-2px,-1px)} 100%{transform:translate(1px,-1px)} }
        
        .next-cursor { 
            position: absolute; bottom: 15px; right: 30px; 
            color: var(--point-color); animation: bounce 1s infinite; display: none; 
        }
        @keyframes bounce { 0%, 100% {transform: translateY(0)} 50% {transform: translateY(-5px)} }
    </style>
</head>
<body>

    <div id="game-outer-container">
        <div id="start-layer">
            <h1 style="color:white; margin-bottom: 30px;">수호천사 유나</h1>
            <button id="start-btn">GAME START</button>
        </div>

        <div id="game-bg"></div>
        <div id="game-screen">
            <div id="linear-choice-container" class="choice-container"></div>
            <div id="branch-choice-overlay" class="choice-container" style="display:none;"></div>

            <div id="dialogue-area">
                <div id="player-badge"></div>
                <div id="name-label">유나</div>
                <div id="text-content"></div>
                <div class="next-cursor">▼</div>
            </div>
        </div>
    </div>

    <script>
        const script = [
            { type: 'char', bg: '1', name: '유나', text: '저기 있잖아....' },
            { type: 'player_linear', choices: ['뭔데', '누군데 말걸지?', '저기 없는데.'] },
            { type: 'char', bg: '2', name: '유나', text: '제발 도와줘!!!!' },
            { type: 'player_linear', choices: ['일단 말해봐', '내가 왜', '싫어'] },
            { type: 'char', bg: '3', name: '유나', text: '사실 나는 천사인데, 하늘에서 떨어져 버렸어... \n그런데 날개를 다쳐서 회복될 때까지만 같이있어줘.' },
            { type: 'char', bg: '4', name: '유나', text: '내가 너의 수호천사가 되줄게!!!' },
            { type: 'branch', choices: [
                { text: '재미있겠다 당장하자', nextIndex: 7 },
                { text: '천사라고? 미친거야? 너 사이비지?', nextIndex: 8 }
            ]},
            { type: 'char', bg: '5', name: '유나', text: '정말? 너무 고마워 진짜 기뻐~', end: true },
            { type: 'char', bg: '6', name: '유나', text: '<span class="shake">흐아아앙!!!</span> \n그런거 진짜 아니란 말이야아....', end: true }
        ];

        let currentIdx = 0;
        let isTyping = false;
        let typingTimer;
        let fullTextContent = "";

        const bgElem = document.getElementById('game-bg');
        const screenElem = document.getElementById('game-screen');
        const textElem = document.getElementById('text-content');
        const nameElem = document.getElementById('name-label');
        const linearBox = document.getElementById('linear-choice-container');
        const branchBox = document.getElementById('branch-choice-overlay');
        const playerBadge = document.getElementById('player-badge');
        const nextCursor = document.querySelector('.next-cursor');

        function typeText(targetText, name, callback) {
            isTyping = true;
            nextCursor.style.display = 'none';
            nameElem.innerText = name;
            fullTextContent = targetText;
            
            // HTML 태그(shake 등)가 포함된 경우 즉시 출력
            if(targetText.includes('<span')) {
                textElem.innerHTML = targetText;
                finishTyping(callback);
                return;
            }

            textElem.innerText = '';
            let i = 0;
            clearInterval(typingTimer);
            typingTimer = setInterval(() => {
                if(i < targetText.length) {
                    textElem.innerText += targetText.charAt(i);
                    i++;
                } else {
                    finishTyping(callback);
                }
            }, 40);
        }

        function finishTyping(callback) {
            clearInterval(typingTimer);
            isTyping = false;
            nextCursor.style.display = 'block';
            if(callback) callback();
        }

        function render() {
            const data = script[currentIdx];
            if(!data) return;

            // UI 초기화
            linearBox.style.display = 'none';
            branchBox.style.display = 'none';
            playerBadge.style.display = 'none';

            if(data.type === 'char') {
                if(data.bg) {
                    bgElem.style.backgroundImage = `url('${data.bg}.png')`;
                }
                typeText(data.text, data.name);
            } else {
                showChoiceUI(data);
            }
        }

        function showChoiceUI(data) {
            nextCursor.style.display = 'none';
            const isBranch = data.type === 'branch';
            const container = isBranch ? branchBox : linearBox;
            
            container.innerHTML = '';
            container.style.display = 'flex';

            data.choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = isBranch ? 'branch-btn' : 'choice-btn';
                btn.innerText = isBranch ? c.text : c;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    const nextIdx = isBranch ? c.nextIndex : currentIdx + 1;
                    selectChoice(btn.innerText, nextIdx);
                };
                container.appendChild(btn);
            });
        }

        function selectChoice(txt, next) {
            linearBox.style.display = 'none';
            branchBox.style.display = 'none';
            playerBadge.innerText = txt;
            playerBadge.style.display = 'block';

            // 플레이어가 대답하는 연출
            typeText(txt, '나', () => {
                currentIdx = next; // 선택지 이후 다음 인덱스 설정
            });
        }

        // 화면 클릭 핸들러
        screenElem.onclick = () => {
            // 1. 타이핑 중이면 즉시 완료
            if(isTyping) {
                if(fullTextContent.includes('<span')) textElem.innerHTML = fullTextContent;
                else textElem.innerText = fullTextContent;
                finishTyping();
                return;
            }

            // 2. 선택지가 떠 있으면 클릭 방지
            if(linearBox.style.display === 'flex' || branchBox.style.display === 'flex') return;

            // 3. 현재 장면이 char 타입일 때의 흐름 제어
            const data = script[currentIdx];
            if(data && data.type === 'char') {
                if(data.end) {
                    alert("이야기가 종료되었습니다.");
                    location.reload();
                } else {
                    currentIdx++;
                    render();
                }
            } else {
                // player_linear 이후 대사가 끝난 상태에서 클릭하면 다음 render 호출
                render();
            }
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-layer').style.display = 'none';
            render();
        };
    </script>
</body>
</html>
