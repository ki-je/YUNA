<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수호천사 유나 - Branch Fixed</title>
    <style>
        :root {
            --point-color: #87CEEB;
            --bg-grad: linear-gradient(to bottom, rgba(0, 0, 0, 0.7), rgba(0, 0, 0, 0.95));
            --aspect-ratio: 1216 / 832;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden; font-family: 'Malgun Gothic', sans-serif;
            background-color: #000; display: flex; justify-content: center; align-items: center;
        }

        #game-outer-container {
            width: 100vw; height: calc(100vw / (var(--aspect-ratio)));
            max-width: 1216px; max-height: 832px;
            position: relative; overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* 배경 레이어 (페이드 효과) */
        .bg-layer {
            position: absolute; inset: 0;
            background-size: cover; background-position: center;
            transition: opacity 0.8s ease-in-out;
        }
        #bg-back { opacity: 0; }
        #bg-front { opacity: 1; z-index: 1; }

        #game-screen {
            position: absolute; inset: 0; z-index: 5;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            cursor: pointer;
        }

        /* 중앙 중요 선택지 (▶) */
        #branch-choice-overlay {
            position: absolute; inset: 0; background: rgba(0, 0, 0, 0.7);
            display: none; flex-direction: column; justify-content: center;
            align-items: center; gap: 20px; z-index: 40;
        }
        .branch-btn {
            width: 80%; max-width: 550px; padding: 25px;
            background: rgba(255, 255, 255, 0.05); color: white;
            border: 2px solid var(--point-color); border-radius: 12px;
            font-size: 22px; font-weight: bold; cursor: pointer;
            backdrop-filter: blur(5px); transition: all 0.3s; text-align: center;
        }
        .branch-btn:hover { background: var(--point-color); color: #000; box-shadow: 0 0 25px var(--point-color); }

        /* 일반 선택지 (☆) */
        #linear-choice-container {
            position: absolute; bottom: 230px; right: 4%;
            display: none; flex-direction: column; gap: 12px; z-index: 30;
        }
        .linear-btn {
            background: #fff; color: #111; border: 3px solid var(--point-color);
            padding: 15px 30px; border-radius: 25px 25px 0 25px;
            font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.2s;
        }
        .linear-btn:hover { background: var(--point-color); color: white; transform: translateX(-5px); }

        /* 대사창 */
        #dialogue-area {
            position: relative; width: 94%; height: 200px;
            margin-bottom: 25px; padding: 35px 45px;
            background: var(--bg-grad); border-radius: 15px;
            border: 1px solid rgba(135, 206, 235, 0.3);
            box-sizing: border-box; color: white;
        }

        #player-badge {
            position: absolute; top: -42px; right: 30px;
            background: var(--point-color); color: #000;
            padding: 8px 25px; font-weight: bold; border-radius: 12px 12px 0 0;
            display: none; font-size: 16px;
        }

        #name-label { color: var(--point-color); font-size: 26px; font-weight: bold; margin-bottom: 15px; }
        #text-content { font-size: 20px; line-height: 1.8; word-break: keep-all; }

        /* 특수 효과: 큰 폰트 + 흔들림 */
        .big-shake { 
            display: inline-block; 
            font-size: 1.5em; 
            font-weight: 900; 
            color: #ff8e8e; 
            animation: shake-anim 0.1s infinite; 
            vertical-align: middle;
            margin-right: 5px;
        }
        @keyframes shake-anim { 0%{transform:translate(1px,1px)} 50%{transform:translate(-2px,-1px)} 100%{transform:translate(1px,-1px)} }
        
        .next-cursor { position: absolute; bottom: 20px; right: 35px; color: var(--point-color); animation: bounce 1s infinite; display: none; }
        @keyframes bounce { 0%, 100% {transform: translateY(0)} 50% {transform: translateY(-5px)} }

        #start-layer { position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        #start-btn { background: none; border: 3px solid var(--point-color); color: var(--point-color); padding: 20px 70px; font-size: 30px; cursor: pointer; border-radius: 50px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="game-outer-container">
        <div id="bg-back" class="bg-layer"></div>
        <div id="bg-front" class="bg-layer"></div>

        <div id="start-layer">
            <h1 style="color:white; margin-bottom: 40px; font-size: 40px;">수호천사 유나</h1>
            <button id="start-btn">GAME START</button>
        </div>

        <div id="game-screen">
            <div id="linear-choice-container"></div>
            <div id="branch-choice-overlay"></div>

            <div id="dialogue-area">
                <div id="player-badge"></div>
                <div id="name-label">유나</div>
                <div id="text-content"></div>
                <div class="next-cursor">▼ CLICK</div>
            </div>
        </div>
    </div>

    <script>
        const script = [
            /* 0 */ { type: 'char', bg: '1', name: '유나', text: '저기 있잖아....' },
            /* 1 */ { type: 'player_linear', choices: ['뭔데', '누군데 말걸지?', '저기 없는데.'] },
            /* 2 */ { type: 'char', bg: '2', name: '유나', text: '제발 도와줘!!!!' },
            /* 3 */ { type: 'player_linear', choices: ['일단 말해봐', '내가 왜', '싫어'] },
            /* 4 */ { type: 'char', bg: '3', name: '유나', text: '사실 나는 천사인데, 하늘에서 떨어져 버렸어... \n그런데 날개를 다쳐서 회복될 때까지만 같이있어줘.' },
            /* 5 */ { type: 'char', bg: '4', name: '유나', text: '내가 너의 수호천사가 되줄게!!!' },
            /* 6 */ { type: 'branch', choices: [
                        { text: '재미있겠다 당장하자', nextIndex: 7 },
                        { text: '천사라고? 미친거야? 너 사이비지?', nextIndex: 8 }
                    ]},
            /* 7 */ { type: 'char', bg: '5', name: '유나', text: '정말? 너무 고마워 진짜 기뻐~', end: true },
            /* 8 */ { type: 'char', bg: '6', name: '유나', text: '<span class="big-shake">흐아아앙!!!</span> 그런거 진짜 아니란 말이야아....', end: true }
        ];

        let currentIdx = 0;
        let isTyping = false;
        let typingTimer;
        let fullTextContent = "";
        let currentBG = "";

        const textElem = document.getElementById('text-content');
        const nameElem = document.getElementById('name-label');
        const linearBox = document.getElementById('linear-choice-container');
        const branchBox = document.getElementById('branch-choice-overlay');
        const playerBadge = document.getElementById('player-badge');
        const nextCursor = document.querySelector('.next-cursor');

        function changeBG(bgNum) {
            if (currentBG === bgNum) return;
            const front = document.getElementById('bg-front');
            const back = document.getElementById('bg-back');
            const url = `${bgNum}.png`;

            back.style.backgroundImage = `url('${url}')`;
            back.style.opacity = 1;
            front.style.opacity = 0;

            setTimeout(() => {
                front.style.backgroundImage = `url('${url}')`;
                front.style.opacity = 1;
                back.style.opacity = 0;
                currentBG = bgNum;
            }, 800);
        }

        function typeText(targetText, name, callback) {
            isTyping = true;
            nextCursor.style.display = 'none';
            nameElem.innerText = name;
            fullTextContent = targetText;
            
            // 태그가 포함된 경우 한꺼번에 출력 (타이핑 효과 깨짐 방지)
            if (targetText.includes('<')) {
                textElem.innerHTML = targetText;
                finishTyping(callback);
            } else {
                textElem.innerText = '';
                let i = 0;
                clearInterval(typingTimer);
                typingTimer = setInterval(() => {
                    if (i < targetText.length) {
                        textElem.innerText += targetText.charAt(i);
                        i++;
                    } else {
                        finishTyping(callback);
                    }
                }, 40);
            }
        }

        function finishTyping(callback) {
            clearInterval(typingTimer);
            isTyping = false;
            nextCursor.style.display = 'block';
            if (callback) callback();
        }

        function render() {
            const data = script[currentIdx];
            if (!data) return;

            linearBox.style.display = 'none';
            branchBox.style.display = 'none';

            if (data.type === 'char') {
                if (data.bg) changeBG(data.bg);
                typeText(data.text, data.name);
            } else {
                showChoiceUI(data);
            }
        }

        function showChoiceUI(data) {
            nextCursor.style.display = 'none';
            const isBranch = data.type === 'branch';
            const targetBox = isBranch ? branchBox : linearBox;
            
            targetBox.innerHTML = '';
            targetBox.style.display = 'flex';

            data.choices.forEach(c => {
                const btn = document.createElement('div');
                btn.className = isBranch ? 'branch-btn' : 'linear-btn';
                const txt = isBranch ? c.text : c;
                const next = isBranch ? c.nextIndex : currentIdx + 1;

                btn.innerText = txt;
                btn.onclick = (e) => {
                    e.stopPropagation();
                    selectChoice(txt, next);
                };
                targetBox.appendChild(btn);
            });
        }

        function selectChoice(txt, next) {
            linearBox.style.display = 'none';
            branchBox.style.display = 'none';
            playerBadge.innerText = txt;
            playerBadge.style.display = 'block';

            // 플레이어 대사 출력
            typeText(txt, '나', () => {
                currentIdx = next; // 선택지에 지정된 인덱스로 점프 준비
            });
        }

        document.getElementById('game-screen').onclick = () => {
            if (isTyping) {
                textElem.innerHTML = fullTextContent;
                finishTyping();
                return;
            }

            if (linearBox.style.display === 'flex' || branchBox.style.display === 'flex') return;

            const data = script[currentIdx];
            
            // 현재 대사가 끝(엔딩)인 경우
            if (data && data.end && playerBadge.style.display === 'none') {
                alert("이야기가 종료되었습니다.");
                location.reload();
                return;
            }

            // 플레이어 대사창이 떠 있는 상태에서 클릭하면 뱃지 숨기고 다음(유나 대사) 렌더링
            if (playerBadge.style.display === 'block') {
                playerBadge.style.display = 'none';
                render();
            } else {
                // 일반적인 대사 진행
                currentIdx++;
                render();
            }
        };

        document.getElementById('start-btn').onclick = () => {
            document.getElementById('start-layer').style.display = 'none';
            render();
        };
    </script>
</body>
</html>
